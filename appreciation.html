<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appreciation | Music as Emotional Expression</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            background-color: #f0f7f9;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            max-width: 600px;
            width: 90%;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 20px;
        }
        .thumbs-up {
            font-size: 4rem;
            margin: 20px 0;
        }
        h2 {
            font-size: 2.2rem;
            margin-bottom: 20px;
        }
        /* Style for the typing text */
        #typing-text {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
            min-height: 120px; /* Prevents the box from jumping while typing */
        }
        /* The cursor effect */
        .cursor {
            border-right: 2px solid #2c3e50;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        .btn-home {
            background-color: #2c3e50;
            color: white;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            display: inline-block;
            transition: background 0.3s, transform 0.2s;
            opacity: 0; /* Hidden until typing is done */
        }
        .btn-home.visible {
            opacity: 1;
            transition: opacity 1s;
        }

        .references {
            max-width: 600px;
            width: 90%;
            font-size: 0.75rem;
            color: #7f8c8d;
            text-align: left;
            word-wrap: break-word;
        }
        .references a { color: #3498db; text-decoration: none; }
        .references a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <div class="thumbs-up">💟</div>
        
        <h2>Thank You</h2>
        
        <!-- This is where the typing magic happens -->
        <p id="typing-text"></p>

        <a href="index.html" id="home-btn" class="btn-home">Back to Home Page</a>
    </div>

    <div class="references">
        <strong>References:</strong><br>
        • <a href="https://www.psychologytoday.com/us/blog/science-choice/201908/music-emotion-and-well-being" target="_blank">Psychology Today: Music, Emotion, and Well-Being</a><br>
        • <a href="https://www.youtube.com/watch?v=iFFATyenHNk" target="_blank">YouTube: Music and Emotion</a><br>
        • <a href="https://www.psychologytoday.com/us/blog/science-of-choice/202309/how-music-affects-us-emotionally" target="_blank">Psychology Today: How Music Affects Us Emotionally</a>
    </div>

    <script>
        const text = "Thank you for exploring how music acts as a universal language for our emotions. Whether finding joy in a major key or comfort in a slow rhythm, music remains a vital part of our emotional well-being. We hope this journey has helped you understand your favorite songs in a whole new way.";
        
        let index = 0;
        const speed = 40; // Speed in milliseconds (lower is faster)
        const textElement = document.getElementById("typing-text");
        const btn = document.getElementById("home-btn");

        function typeWriter() {
            if (index < text.length) {
                textElement.innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, speed);
            } else {
                // Show the button once the typing is finished
                btn.classList.add("visible");
            }
        }

        // Start the effect when the page loads
        window.onload = typeWriter;
    </script>

</body>
</html>
