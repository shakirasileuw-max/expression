<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music as Emotional Expression | Home</title>
    <style>
        /* Base Styles */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Georgia', serif;
            background-color: #f0f7f9;
            color: #2c3e50;
        }

        /* Centering the content */
        .hero-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* The Title */
        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            font-style: italic;
            letter-spacing: 2px;
            border-bottom: 3px solid #2c3e50;
            padding-bottom: 15px;
        }

        p.subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #555;
            min-height: 1.5em; /* Keeps layout steady while name loads */
        }

        /* Navigation Button */
        .start-btn {
            background-color: #2c3e50;
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: transform 0.3s, background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .start-btn:hover {
            background-color: #1a252f;
            transform: scale(1.05);
        }

        .icon {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="icon">🏠</div>
        
        <h1>Music as Emotional Expression</h1>
        <!-- We gave this an ID so JavaScript can find it and change the text -->
        <p class="subtitle" id="welcome-text">Exploring the universal language of the soul.</p>

        <a href="purpose.html" class="start-btn">
            Begin Journey <span>➔</span>
        </a>
    </div>

    <script>
        // Use a pop-up (prompt) to get the user's name
        let userName = prompt("Welcome! What is your name?");

        // If the user entered a name, customize the welcome message
        if (userName !== null && userName !== "") {
            document.getElementById("welcome-text").innerText = 
                "Welcome, " + userName + "! Exploring the universal language of the soul.";
        }
    </script>

</body>
</html>
