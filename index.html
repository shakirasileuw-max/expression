<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music as Emotional Expression | Home</title>
    <style>
        /* Base Styles */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Georgia', serif; /* Classic, elegant feel for music */
            background-color: #f0f7f9; /* Light blue tint matching your map */
            color: #2c3e50;
        }

        /* Centering the content */
        .hero-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* The Title */
        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            font-style: italic;
            letter-spacing: 2px;
            border-bottom: 3px solid #2c3e50;
            padding-bottom: 15px;
        }

        p.subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #555;
        }

        /* Navigation Button (Based on your arrow map) */
        .start-btn {
            background-color: #2c3e50; /* Dark blue from your map arrows */
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: transform 0.3s, background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .start-btn:hover {
            background-color: #1a252f;
            transform: scale(1.05);
        }

        /* Simple icon style */
        .icon {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="icon">🏠</div>
        
        <h1>Music as Emotional Expression</h1>
        <p class="subtitle">Exploring the universal language of the soul.</p>

        <a href="purpose.html" class="start-btn">
            Begin Journey <span>➔</span>
        </a>
    </div>

</body>
</html>
